name: Generate README Banner

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/assets/templates/**'
      - '.github/assets/fonts/**'
      - 'scripts/generate-readme-banner.mjs'
      - '.github/workflows/generate-readme-banner.yml'

permissions:
  contents: write

jobs:
  generate-banner:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate README banners
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-readme-banner.mjs

      - name: Commit generated banners
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/assets/readme-banner_light.png .github/assets/readme-banner_dark.png

          if git diff --cached --quiet; then
            echo "No banner changes to commit."
            exit 0
          fi

          git commit -m "chore: regenerate README banners"
          git push
